version: '3.8'

services:
  newsletter-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-newsletter-agent
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../logs:/app/logs
      - ../newsletters:/app/newsletters
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: ["python", "main.py", "--mode", "schedule"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  newsletter-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-newsletter-api
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../logs:/app/logs
      - ../newsletters:/app/newsletters
    ports:
      - "8001:8000"
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "api.fastapi_server:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: newsletter-network
